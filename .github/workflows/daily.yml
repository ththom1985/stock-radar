name: Stock Radar Volllauf (News + Fundamental)

# VOLLLAUF 3x/Handelstag: inkl. News-RSS, KI-News, Bilanz-Kennzahlen. Die Kurse
# werden zusätzlich alle 15 Min vom leichten Intraday-Workflow (intraday.yml)
# aktualisiert. Zeiten in UTC.
on:
  schedule:
    - cron: "0 14 * * 1-5"    # ~kurz nach US-Open
    - cron: "0 17 * * 1-5"    # Mittag US
    - cron: "45 19 * * 1-5"   # kurz vor US-Close
  workflow_dispatch:            # manuell startbar

permissions:
  contents: write               # damit der Bot latest.json committen darf

concurrency:
  group: stock-radar-data
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements-ci.txt

      - name: Analyse ausführen
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m src.analyze

      - name: Ergebnis committen
        run: |
          git config user.name "stock-radar-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/output/latest.json data/fundamentals.json data/portfolio.json data/earnings.json data/fx_usd.json data/macro.json data/intraday_patterns.json
          git commit -m "Analyse $(date -u +%Y-%m-%dT%H:%MZ)" || echo "keine Änderungen"
          git pull --rebase --autostash origin main || true
          git push || echo "push übersprungen"
