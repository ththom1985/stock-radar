name: Stock Radar Intraday (Kurse)

# Häufiger, leichter Lauf: nur Kurse/Scores/Makro frisch, News vom letzten
# Volllauf übernommen. Alle 15 Min während der US-Handelszeit (Mo-Fr, UTC).
# Um 7 Min versetzt, damit es nicht mit dem Volllauf (daily.yml) kollidiert.
on:
  schedule:
    # Zeiten in UTC (Sommer/DST). Dicht rund um Open/Close, locker mittags,
    # nachts/geschlossen aus. US ist am wichtigsten (~80% des Universums).
    # --- US-Open 13:30 UTC (15:30 dt.): sehr dicht, ~alle 10 Min ---
    - cron: "22,32,42,52 13 * * 1-5"
    - cron: "2,12,22,32,42,52 14 * * 1-5"
    # --- US-Mittag: locker, alle 30 Min ---
    - cron: "2,32 15-18 * * 1-5"
    # --- US-Close 20:00 UTC (22:00 dt.): dicht ---
    - cron: "2,12,22,32,42,52 19 * * 1-5"
    - cron: "2,12 20 * * 1-5"
    # --- Europa-Open ~07:00 UTC (09:00 dt.): alle 20 Min ---
    - cron: "2,22,42 7 * * 1-5"
    # --- Europa-Vormittag: stündlich (leicht) ---
    - cron: "2 8-12 * * 1-5"
    # --- Asien Open/Close: nur je 1 Touch ---
    - cron: "2 1 * * 1-5"
    - cron: "2 6 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: stock-radar-data
  cancel-in-progress: false

jobs:
  intraday:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements-ci.txt

      - name: Intraday-Kurse ausführen
        env:
          STOCK_RADAR_INTRADAY: "1"
          STOCK_RADAR_DEEP_MAX: "0"
        run: python -m src.analyze

      - name: Ergebnis committen
        run: |
          git config user.name "stock-radar-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/output/latest.json data/portfolio.json data/macro.json data/fx_usd.json
          git commit -m "Intraday $(date -u +%Y-%m-%dT%H:%MZ)" || echo "keine Änderungen"
          git pull --rebase --autostash origin main || true
          git push || echo "push übersprungen"
